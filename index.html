<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BULK Wrapped</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --bg-card: #0a0a0a;
      --bg-elevated: #111111;
      --text: #ffffff;
      --text-dim: #888888;
      --accent: #00ff88;
      --accent-secondary: #00d4ff;
      --gradient-1: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      --gradient-2: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
      --gradient-3: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      --gradient-4: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }

    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }

    .input-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .handle-input {
      background: var(--bg-elevated);
      border: 2px solid #222;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      font-size: 1.1rem;
      color: var(--text);
      font-family: inherit;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .handle-input:focus { 
      outline: none; 
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }
    .handle-input::placeholder { color: var(--text-dim); }

    .generate-btn {
      background: var(--gradient-1);
      border: none;
      border-radius: 16px;
      padding: 1.25rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .generate-btn:hover { 
      transform: scale(1.02);
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
    }
    .generate-btn:active { transform: scale(0.98); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .loading-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid var(--bg-elevated);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 2rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 1.2rem;
      color: var(--text-dim);
      min-height: 30px;
    }

    .loading-handle {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent);
      margin-top: 0.5rem;
    }

    .story-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    .card-wrapper {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9/16;
      max-height: 90vh;
      position: relative;
      perspective: 1000px;
    }

    .story-card {
      position: absolute;
      inset: 0;
      background: var(--bg-card);
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid #222;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .card-gradient {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 250px;
      opacity: 0.4;
      z-index: 0;
      filter: blur(40px);
    }

    .card-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
    }

    .card-number {
      position: absolute;
      top: 1rem; right: 1rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      padding: 0.3rem 0.6rem;
      border-radius: 20px;
    }

    .card-label {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 1.5rem;
    }

    .card-value {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    .card-value.gradient { background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-value.gradient-2 { background: var(--gradient-2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-value.gradient-3 { background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-value.gradient-4 { background: var(--gradient-4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .card-value.small { font-size: 2rem; }

    .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
    .card-subtitle { font-size: 1rem; color: var(--text-dim); max-width: 85%; line-height: 1.5; }

    .tweet-preview {
      background: var(--bg-elevated);
      border-radius: 16px;
      margin-top: 1.5rem;
      width: 100%;
      text-align: left;
      border: 1px solid #222;
      overflow: hidden;
    }

    .tweet-media {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-bottom: 1px solid #222;
      background: #111;
    }

    .tweet-body { padding: 1rem; }

    .tweet-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tweet-stats { display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--text-dim); }
    .tweet-stat { display: flex; align-items: center; gap: 0.4rem; }
    .tweet-stat svg { width: 16px; height: 16px; }

    .progress-bar {
      display: flex;
      gap: 4px;
      margin-top: 1.5rem;
      width: 100%;
      max-width: 300px;
    }

    .progress-segment {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .progress-segment:hover { opacity: 0.8; }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-segment.completed .progress-fill { width: 100%; }
    .progress-segment.active .progress-fill { 
      width: 100%;
      animation: progressGrow 5s linear forwards;
    }

    @keyframes progressGrow {
      from { width: 0%; }
      to { width: 100%; }
    }

    .nav-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }

    .nav-btn {
      background: var(--bg-elevated);
      border: 1px solid #333;
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .nav-btn:hover { background: #222; border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn svg { width: 20px; height: 20px; }

    .final-logo {
      font-size: 2rem;
      font-weight: 900;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 2rem;
    }

    .share-btn {
      background: var(--gradient-1);
      border: none;
      border-radius: 12px;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 2rem;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .share-btn:hover { 
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
    }

    .restart-btn {
      background: transparent;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      margin-top: 1rem;
      font-family: inherit;
      transition: all 0.2s;
    }

    .restart-btn:hover { border-color: var(--text-dim); color: var(--text); }

    .error-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .error-icon { font-size: 4rem; margin-bottom: 1rem; }
    .error-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .error-message { color: var(--text-dim); margin-bottom: 2rem; max-width: 300px; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      margin-top: 1.5rem;
    }

    .summary-item {
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 1.25rem 1rem;
      text-align: center;
      border: 1px solid #222;
    }

    .summary-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .summary-label { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 1px; }

    .glow { animation: glow 2s ease-in-out infinite alternate; }
    @keyframes glow { from { filter: drop-shadow(0 0 10px rgba(0,255,136,0.5)); } to { filter: drop-shadow(0 0 30px rgba(0,255,136,0.8)); } }

    /* Typewriter cursor */
    .typewriter::after {
      content: '|';
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Word reveal animation */
    .word-reveal {
      display: inline-block;
      overflow: hidden;
    }

    .word-reveal span {
      display: inline-block;
    }

    @media (max-width: 500px) {
      .logo { font-size: 2.5rem; }
      .card-value { font-size: 3rem; }
      .card-value.small { font-size: 1.75rem; }
      .card-wrapper { max-height: 85vh; }
      .story-card { padding: 1.5rem; }
      .tweet-media { height: 130px; }
      .card-label { font-size: 0.75rem; letter-spacing: 2px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = Motion;

    const API_URL = 'https://bulk-wrapped-api-production.up.railway.app';

    function formatNumber(num) {
      if (!num) return '0';
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toLocaleString();
    }

    // Animated counter with easing
    function AnimatedCounter({ value, duration = 2000 }) {
      const [displayValue, setDisplayValue] = useState(0);
      const numericValue = parseInt(String(value).replace(/[^0-9]/g, '')) || 0;
      const suffix = String(value).replace(/[0-9.,]/g, '');

      useEffect(() => {
        setDisplayValue(0);
        let startTime;
        const animate = (timestamp) => {
          if (!startTime) startTime = timestamp;
          const progress = Math.min((timestamp - startTime) / duration, 1);
          // Ease out cubic
          const easeOut = 1 - Math.pow(1 - progress, 3);
          setDisplayValue(Math.floor(easeOut * numericValue));
          if (progress < 1) requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }, [numericValue, duration]);

      return <span>{displayValue.toLocaleString()}{suffix}</span>;
    }

    // Word by word reveal animation
    function WordReveal({ text, delay = 0 }) {
      const words = text.split(' ');
      return (
        <span>
          {words.map((word, i) => (
            <motion.span
              key={i}
              initial={{ opacity: 0, y: 20, filter: 'blur(10px)' }}
              animate={{ opacity: 1, y: 0, filter: 'blur(0px)' }}
              transition={{ 
                delay: delay + i * 0.08,
                duration: 0.4,
                ease: [0.25, 0.46, 0.45, 0.94]
              }}
              style={{ display: 'inline-block', marginRight: '0.3em' }}
            >
              {word}
            </motion.span>
          ))}
        </span>
      );
    }

    // Character by character reveal
    function CharReveal({ text, delay = 0, speed = 0.03 }) {
      return (
        <span>
          {text.split('').map((char, i) => (
            <motion.span
              key={i}
              initial={{ opacity: 0, y: 10 }}
              animate={{ opacity: 1, y: 0 }}
              transition={{ 
                delay: delay + i * speed,
                duration: 0.2
              }}
              style={{ display: 'inline-block', whiteSpace: char === ' ' ? 'pre' : 'normal' }}
            >
              {char}
            </motion.span>
          ))}
        </span>
      );
    }

    function LandingPage({ onSubmit }) {
      const [handle, setHandle] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (handle.trim()) onSubmit(handle.trim().replace('@', ''));
      };

      return (
        <motion.div className="landing" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          <motion.h1 
            className="logo glow"
            initial={{ y: -50, opacity: 0, scale: 0.8 }}
            animate={{ y: 0, opacity: 1, scale: 1 }}
            transition={{ delay: 0.1, type: "spring", stiffness: 150, damping: 15 }}
          >
            BULK WRAPPED
          </motion.h1>
          <motion.p 
            className="tagline"
            initial={{ y: -20, opacity: 0 }}
            animate={{ y: 0, opacity: 1 }}
            transition={{ delay: 0.4 }}
          >
            <WordReveal text="Your @bulktrade journey on X" delay={0.5} />
          </motion.p>

          <motion.form 
            className="input-container"
            onSubmit={handleSubmit}
            initial={{ y: 40, opacity: 0 }}
            animate={{ y: 0, opacity: 1 }}
            transition={{ delay: 0.7, type: "spring", stiffness: 100 }}
          >
            <input
              type="text"
              className="handle-input"
              placeholder="Enter your @handle"
              value={handle}
              onChange={(e) => setHandle(e.target.value)}
            />
            <motion.button 
              type="submit" 
              className="generate-btn"
              disabled={!handle.trim()}
              whileHover={{ scale: 1.03 }}
              whileTap={{ scale: 0.97 }}
            >
              Generate My Wrapped
            </motion.button>
          </motion.form>
        </motion.div>
      );
    }

    function LoadingScreen({ handle }) {
      const messages = [
        "Scanning your timeline...",
        "Finding BULK mentions...",
        "Calculating your impact...",
        "Preparing your wrapped..."
      ];
      const [messageIndex, setMessageIndex] = useState(0);

      useEffect(() => {
        const interval = setInterval(() => setMessageIndex(i => (i + 1) % messages.length), 2000);
        return () => clearInterval(interval);
      }, []);

      return (
        <motion.div className="loading-screen" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          <motion.div 
            className="loading-spinner"
            initial={{ scale: 0 }}
            animate={{ scale: 1 }}
            transition={{ type: "spring", stiffness: 200 }}
          />
          <div className="loading-text">
            <AnimatePresence mode="wait">
              <motion.span
                key={messageIndex}
                initial={{ opacity: 0, y: 20 }}
                animate={{ opacity: 1, y: 0 }}
                exit={{ opacity: 0, y: -20 }}
                transition={{ duration: 0.3 }}
              >
                {messages[messageIndex]}
              </motion.span>
            </AnimatePresence>
          </div>
          <motion.p 
            className="loading-handle" 
            initial={{ opacity: 0, scale: 0.8 }} 
            animate={{ opacity: 1, scale: 1 }} 
            transition={{ delay: 0.3 }}
          >
            @{handle}
          </motion.p>
        </motion.div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <motion.div className="error-screen" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          <motion.div className="error-icon" initial={{ scale: 0, rotate: -180 }} animate={{ scale: 1, rotate: 0 }} transition={{ type: "spring", stiffness: 200 }}>😔</motion.div>
          <motion.h2 className="error-title" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.2 }}>Oops!</motion.h2>
          <motion.p className="error-message" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.3 }}>{message || 'Something went wrong'}</motion.p>
          <motion.button className="generate-btn" onClick={onRetry} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.4 }} whileHover={{ scale: 1.03 }} whileTap={{ scale: 0.97 }}>Try Again</motion.button>
        </motion.div>
      );
    }

    function StoryCard({ card, index, total }) {
      const gradients = ['gradient', 'gradient-2', 'gradient-3', 'gradient-4'];
      const gradient = gradients[index % gradients.length];
      const bgGradients = [
        'radial-gradient(circle at 50% 0%, rgba(0,255,136,0.4) 0%, transparent 60%)',
        'radial-gradient(circle at 50% 0%, rgba(255,107,107,0.4) 0%, transparent 60%)',
        'radial-gradient(circle at 50% 0%, rgba(168,85,247,0.4) 0%, transparent 60%)',
        'radial-gradient(circle at 50% 0%, rgba(59,130,246,0.4) 0%, transparent 60%)'
      ];

      return (
        <motion.div
          className="story-card"
          initial={{ opacity: 0, scale: 0.9, rotateX: 10 }}
          animate={{ opacity: 1, scale: 1, rotateX: 0 }}
          exit={{ opacity: 0, scale: 0.9, rotateX: -10 }}
          transition={{ duration: 0.5, ease: [0.25, 0.46, 0.45, 0.94] }}
        >
          <motion.div 
            className="card-gradient" 
            style={{ background: bgGradients[index % bgGradients.length] }} 
            initial={{ opacity: 0, scale: 0.8 }} 
            animate={{ opacity: 0.4, scale: 1 }} 
            transition={{ delay: 0.2, duration: 0.6 }} 
          />
          <div className="card-content">
            <motion.span className="card-number" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} transition={{ delay: 0.3 }}>{index + 1}/{total}</motion.span>
            
            {card.type === 'intro' && (
              <>
                <motion.p className="card-label" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.2 }}>
                  <CharReveal text="YOUR BULK JOURNEY" delay={0.3} speed={0.04} />
                </motion.p>
                <motion.h2 
                  className={`card-value ${gradient}`} 
                  initial={{ opacity: 0, scale: 0.5, y: 30 }} 
                  animate={{ opacity: 1, scale: 1, y: 0 }} 
                  transition={{ delay: 0.5, type: "spring", stiffness: 150 }}
                >
                  @{card.handle}
                </motion.h2>
                <motion.p className="card-subtitle" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.8 }}>
                  <WordReveal text="Let's see how you've been supporting $BULK" delay={0.9} />
                </motion.p>
              </>
            )}

            {card.type === 'stat' && (
              <>
                <motion.p className="card-label" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.2 }}>
                  {card.label}
                </motion.p>
                <motion.h2 
                  className={`card-value ${card.small ? 'small' : ''} ${gradient}`} 
                  initial={{ opacity: 0, scale: 0.3, y: 50 }} 
                  animate={{ opacity: 1, scale: 1, y: 0 }} 
                  transition={{ delay: 0.4, type: "spring", stiffness: 120, damping: 12 }}
                >
                  {card.animate ? <AnimatedCounter value={card.value} duration={1500} /> : card.value}
                </motion.h2>
                <motion.p className="card-subtitle" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.7 }}>
                  <WordReveal text={card.subtitle} delay={0.8} />
                </motion.p>
              </>
            )}

            {card.type === 'tweet' && (
              <>
                <motion.p className="card-label" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.2 }}>{card.label}</motion.p>
                <motion.h2 
                  className="card-title" 
                  initial={{ opacity: 0, scale: 0.8 }} 
                  animate={{ opacity: 1, scale: 1 }} 
                  transition={{ delay: 0.4, type: "spring" }}
                >
                  {card.title}
                </motion.h2>
                {card.tweet && (
                  <motion.div 
                    className="tweet-preview" 
                    initial={{ opacity: 0, y: 40, scale: 0.95 }} 
                    animate={{ opacity: 1, y: 0, scale: 1 }} 
                    transition={{ delay: 0.5, duration: 0.4 }}
                  >
                    {card.tweet.media && (
                      <motion.img 
                        src={card.tweet.media} 
                        alt="" 
                        className="tweet-media" 
                        onError={(e) => e.target.style.display = 'none'}
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ delay: 0.7 }}
                      />
                    )}
                    <div className="tweet-body">
                      <motion.p 
                        className="tweet-text"
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ delay: 0.8 }}
                      >
                        {card.tweet.text}
                      </motion.p>
                      <motion.div 
                        className="tweet-stats"
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        transition={{ delay: 0.9 }}
                      >
                        <span className="tweet-stat">
                          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                          {formatNumber(card.tweet.likes)}
                        </span>
                        <span className="tweet-stat">
                          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                          {formatNumber(card.tweet.views)}
                        </span>
                      </motion.div>
                    </div>
                  </motion.div>
                )}
              </>
            )}

            {card.type === 'final' && (
              <>
                <motion.h2 
                  className="final-logo glow" 
                  initial={{ opacity: 0, scale: 0.5, y: -20 }} 
                  animate={{ opacity: 1, scale: 1, y: 0 }} 
                  transition={{ delay: 0.2, type: "spring" }}
                >
                  BULK WRAPPED
                </motion.h2>
                <motion.p className="card-label" initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.4 }}>Your Summary</motion.p>
                <motion.div className="summary-grid" initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.5 }}>
                  {[
                    { value: card.stats.posts, label: 'Posts' },
                    { value: card.stats.views, label: 'Views' },
                    { value: card.stats.likes, label: 'Likes' },
                    { value: card.stats.streak, label: 'Month Streak' }
                  ].map((item, i) => (
                    <motion.div 
                      key={i} 
                      className="summary-item" 
                      initial={{ opacity: 0, scale: 0.8, y: 20 }} 
                      animate={{ opacity: 1, scale: 1, y: 0 }} 
                      transition={{ delay: 0.6 + i * 0.1, type: "spring", stiffness: 150 }}
                    >
                      <div className="summary-value">{item.value}</div>
                      <div className="summary-label">{item.label}</div>
                    </motion.div>
                  ))}
                </motion.div>
                <motion.button 
                  className="share-btn"
                  initial={{ opacity: 0, y: 30 }}
                  animate={{ opacity: 1, y: 0 }}
                  transition={{ delay: 1.1 }}
                  whileHover={{ scale: 1.05 }}
                  whileTap={{ scale: 0.95 }}
                  onClick={() => {
                    const text = `My BULK Wrapped 🎁\n\n📝 ${card.stats.posts} posts\n👀 ${card.stats.views} views\n❤️ ${card.stats.likes} likes\n🔥 ${card.stats.streak} month streak\n\nGenerate yours 👇\n${window.location.origin}`;
                    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
                  }}
                >
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                  Share on X
                </motion.button>
              </>
            )}
          </div>
        </motion.div>
      );
    }

    function StoryView({ stats, handle, onRestart }) {
      const [currentIndex, setCurrentIndex] = useState(0);

      const cards = [
        { type: 'intro', handle },
        { type: 'stat', label: 'YOUR JOURNEY STARTED', value: stats.first_post_date || 'Unknown', subtitle: 'When you first mentioned @bulktrade', small: true },
        { type: 'stat', label: 'TOTAL BULK POSTS', value: String(stats.total_posts), subtitle: 'Times you mentioned @bulktrade', animate: true },
        { type: 'stat', label: 'TOTAL VIEWS', value: formatNumber(stats.total_views), subtitle: 'People saw your BULK content', animate: true },
        { type: 'stat', label: 'TOTAL LIKES', value: formatNumber(stats.total_likes), subtitle: 'Hearts on your BULK posts', animate: true },
        { type: 'stat', label: 'POSTING STREAK', value: stats.posting_streak + ' months', subtitle: 'Consecutive months supporting BULK' }
      ];

      if (stats.most_viral_post) cards.push({ type: 'tweet', label: 'YOUR VIRAL HIT', title: formatNumber(stats.most_viral_post.views) + ' views 🔥', tweet: stats.most_viral_post });
      if (stats.most_liked_post && stats.most_liked_post.text !== stats.most_viral_post?.text) cards.push({ type: 'tweet', label: 'MOST LOVED POST', title: formatNumber(stats.most_liked_post.likes) + ' likes ❤️', tweet: stats.most_liked_post });
      cards.push({ type: 'final', stats: { posts: formatNumber(stats.total_posts), views: formatNumber(stats.total_views), likes: formatNumber(stats.total_likes), streak: stats.posting_streak } });

      const goNext = () => { if (currentIndex < cards.length - 1) setCurrentIndex(currentIndex + 1); };
      const goPrev = () => { if (currentIndex > 0) setCurrentIndex(currentIndex - 1); };

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
          else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [currentIndex]);

      return (
        <motion.div className="story-container" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          <div className="card-wrapper" onClick={goNext} style={{ cursor: currentIndex < cards.length - 1 ? 'pointer' : 'default' }}>
            <AnimatePresence mode="wait">
              <StoryCard key={currentIndex} card={cards[currentIndex]} index={currentIndex} total={cards.length} />
            </AnimatePresence>
          </div>

          <div className="progress-bar">
            {cards.map((_, i) => (
              <div 
                key={i} 
                className={`progress-segment ${i < currentIndex ? 'completed' : ''} ${i === currentIndex ? 'active' : ''}`}
                onClick={() => setCurrentIndex(i)}
              >
                <div className="progress-fill" style={i < currentIndex ? { width: '100%' } : i === currentIndex ? {} : { width: '0%' }} />
              </div>
            ))}
          </div>

          <div className="nav-buttons">
            <motion.button className="nav-btn" onClick={(e) => { e.stopPropagation(); goPrev(); }} disabled={currentIndex === 0} whileHover={{ scale: 1.1 }} whileTap={{ scale: 0.9 }}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
            </motion.button>
            <motion.button className="nav-btn" onClick={(e) => { e.stopPropagation(); goNext(); }} disabled={currentIndex === cards.length - 1} whileHover={{ scale: 1.1 }} whileTap={{ scale: 0.9 }}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
            </motion.button>
          </div>

          {currentIndex === cards.length - 1 && (
            <motion.button className="restart-btn" onClick={onRestart} initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ delay: 0.5 }}>Try Another Handle</motion.button>
          )}
        </motion.div>
      );
    }

    function App() {
      const [screen, setScreen] = useState('landing');
      const [handle, setHandle] = useState('');
      const [stats, setStats] = useState(null);
      const [error, setError] = useState('');

      const handleSubmit = async (inputHandle) => {
        setHandle(inputHandle);
        setScreen('loading');
        setError('');

        try {
          const response = await fetch(`${API_URL}/api/wrapped`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ handle: inputHandle })
          });

          const data = await response.json();
          if (!response.ok) throw new Error(data.error || 'Failed to fetch data');

          setStats(data.stats);
          setScreen('story');
        } catch (err) {
          console.error('Error:', err);
          setError(err.message || 'Something went wrong');
          setScreen('error');
        }
      };

      const handleRestart = () => {
        setScreen('landing');
        setHandle('');
        setStats(null);
        setError('');
      };

      return (
        <AnimatePresence mode="wait">
          {screen === 'landing' && <LandingPage key="landing" onSubmit={handleSubmit} />}
          {screen === 'loading' && <LoadingScreen key="loading" handle={handle} />}
          {screen === 'story' && stats && <StoryView key="story" stats={stats} handle={handle} onRestart={handleRestart} />}
          {screen === 'error' && <ErrorScreen key="error" message={error} onRetry={handleRestart} />}
        </AnimatePresence>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
