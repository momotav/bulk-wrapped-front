<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BULK Wrapped</title>
  <link rel="icon" type="image/png" href="assets/logo.png?v=2">
  <link rel="apple-touch-icon" href="assets/logo.png?v=2">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      background: #141310;
      overscroll-behavior: none;
    }
    :root {
      /* BULK Brand - Primary Dark Palette */
      --bulk-base: #141310;
      --bg: #1B1A14;
      --bg-card: #141310;
      --bg-elevated: #1B1A14;
      --bg-secondary: #544A4C;
      --border: rgba(84, 74, 76, 0.6);
      --border-hover: #FFFEEF;
      
      /* Text */
      --text: #FFFEEF;
      --text-dim: #C6B6BA;
      --text-muted: #736A6C;
      
      /* Primary Accent - WHITE */
      --accent: #FFFEEF;
      --accent-glow: rgba(255, 254, 239, 0.2);
      
      /* Secondary Accents */
      --gold: #FFB547;
      --gold-dim: rgba(255, 181, 71, 0.15);
      
      /* Market Colors - EQUAL usage */
      --green: #00B481;
      --green-secondary: #134A55;
      --green-glow: rgba(0, 180, 129, 0.4);
      --red: #EF4A3C;
      --red-secondary: #6E1742;
      --red-glow: rgba(239, 74, 60, 0.4);
      
      /* Gradients */
      --gradient-white: linear-gradient(135deg, #FFFEEF 0%, #C6B6BA 100%);
      --gradient-green: linear-gradient(135deg, #00B481 0%, #134A55 100%);
      --gradient-red: linear-gradient(135deg, #EF4A3C 0%, #6E1742 100%);
      --gradient-gold: linear-gradient(135deg, #FFB547 0%, #C68A2E 100%);
    }
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: linear-gradient(180deg, #141310 0%, #211F1B 50%, #141310 100%);
      background-attachment: fixed;
      background-color: #141310;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior: none;
      position: relative;
    }
    /* Falling Stars Background - matches BulkGram leaderboard */
    .stars-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
    .star {
      position: absolute;
      width: 20px;
      height: 20px;
      background-image: url('https://bulkgram.com/assets/star.png');
      background-size: contain;
      background-repeat: no-repeat;
      opacity: 0.4;
      filter: drop-shadow(0 0 3px rgba(255, 215, 0, 0.3));
      animation: fallAndRotate linear infinite;
    }
    /* Fallback if image doesn't load - shows a glowing dot */
    .star.no-image {
      background-image: none;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.8) 0%, rgba(255, 215, 0, 0) 70%);
      border-radius: 50%;
    }
    .star.reverse {
      animation: fallAndRotateReverse linear infinite;
    }
    @keyframes fallAndRotate {
      0% {
        transform: translateY(-100px) translateX(0px) rotate(0deg);
      }
      25% {
        transform: translateY(calc(25vh)) translateX(20px) rotate(90deg);
      }
      50% {
        transform: translateY(calc(50vh)) translateX(-15px) rotate(180deg);
      }
      75% {
        transform: translateY(calc(75vh)) translateX(25px) rotate(270deg);
      }
      100% {
        transform: translateY(calc(100vh + 100px)) translateX(0px) rotate(360deg);
      }
    }
    @keyframes fallAndRotateReverse {
      0% {
        transform: translateY(-100px) translateX(0px) rotate(360deg);
      }
      25% {
        transform: translateY(calc(25vh)) translateX(-20px) rotate(270deg);
      }
      50% {
        transform: translateY(calc(50vh)) translateX(15px) rotate(180deg);
      }
      75% {
        transform: translateY(calc(75vh)) translateX(-25px) rotate(90deg);
      }
      100% {
        transform: translateY(calc(100vh + 100px)) translateX(0px) rotate(0deg);
      }
    }
    #root { min-height: 100vh; position: relative; z-index: 1; }
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: var(--gradient-white);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline { color: var(--text-dim); font-size: 1.1rem; margin-bottom: 3rem; }
    .input-container { display: flex; flex-direction: column; gap: 1rem; width: 100%; max-width: 400px; }
    .handle-input {
      background: var(--bg-elevated);
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      font-size: 1.1rem;
      color: var(--text);
      font-family: inherit;
      text-align: center;
      transition: all 0.3s;
    }
    .handle-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
    .handle-input::placeholder { color: var(--text-dim); }
    .generate-btn {
      background: var(--accent);
      border: none;
      border-radius: 16px;
      padding: 1.25rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--bulk-base);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .generate-btn:hover { transform: scale(1.02); box-shadow: 0 10px 40px rgba(255, 254, 239, 0.25); }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .api-disclaimer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      text-align: center;
      line-height: 1.5;
      max-width: 320px;
    }
    .loading-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .loading-handle { font-size: 2rem; font-weight: 700; color: var(--accent); margin-bottom: 2rem; }
    .progress-container { width: 100%; max-width: 350px; margin-bottom: 2rem; }
    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: rgba(84, 74, 76, 0.4);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1rem;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--gradient-white);
      border-radius: 10px;
      transition: width 0.3s ease;
      box-shadow: 0 0 15px var(--accent-glow);
    }
    .progress-percentage {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .progress-message { color: var(--text-dim); font-size: 1rem; min-height: 24px; }
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(84, 74, 76, 0.4);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-top: 1.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .story-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }
    .card-wrapper {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9/16;
      max-height: 90vh;
      position: relative;
      perspective: 1000px;
    }
    .story-card {
      position: absolute;
      inset: 0;
      background: var(--bg-card);
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-gradient {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 250px;
      opacity: 0.4;
      z-index: 0;
      filter: blur(40px);
    }
    .card-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
    }
    .card-number {
      position: absolute;
      top: 1rem; right: 1rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      padding: 0.3rem 0.6rem;
      border-radius: 20px;
    }
    .download-btn {
      position: absolute;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      z-index: 10;
    }
    .download-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: var(--text);
      transform: translateX(-50%) scale(1.05);
    }
    .card-label { font-size: 0.8rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 0.75rem; }
    .card-value { font-size: 4rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1; color: var(--accent); }
    .card-value.small { font-size: 2rem; }
    .card-title { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.5rem; }
    .card-subtitle { font-size: 0.95rem; color: var(--text-dim); max-width: 85%; line-height: 1.4; }
    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      object-fit: cover;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 30px var(--accent-glow);
    }
    .profile-pic-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }
    .tweet-preview {
      background: var(--bg-elevated);
      border-radius: 12px;
      margin-top: 1rem;
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .tweet-media {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
    }
    .tweet-body { padding: 0.6rem; }
    .tweet-date { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 0.25rem; }
    .tweet-text {
      font-size: 0.75rem;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 0.4rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .tweet-stats { display: flex; gap: 1rem; font-size: 0.7rem; color: var(--text-dim); align-items: center; }
    .tweet-stat { display: flex; align-items: center; gap: 0.25rem; }
    .tweet-stat svg { width: 12px; height: 12px; }
    .tweet-link {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-dim);
      transition: all 0.2s;
      margin-left: auto;
    }
    .tweet-link:hover {
      background: rgba(255, 255, 255, 0.2);
      color: var(--text);
      transform: scale(1.1);
    }
    /* Timeline Strip */
    .timeline-strip {
      width: 100%;
      max-width: 420px;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border-radius: 14px;
      border: 1px solid var(--border);
    }
    .timeline-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .timeline-title { font-size: 0.7rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
    .timeline-date-range { font-size: 0.6rem; color: var(--text-dim); }
    .timeline-track { position: relative; height: 6px; border-radius: 3px; background: rgba(84, 74, 76, 0.4); overflow: hidden; }
    .timeline-line-progress { position: absolute; top: 0; left: 0; height: 100%; background: var(--gradient-white); transition: width 0.5s ease; box-shadow: 0 0 12px var(--accent-glow); border-radius: 3px; }
    .progress-bar { display: flex; gap: 4px; margin-top: 1.5rem; width: 100%; max-width: 300px; }
    .progress-segment {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(84, 74, 76, 0.4);
      overflow: hidden;
      cursor: pointer;
    }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s ease; }
    .progress-segment.completed .progress-fill, .progress-segment.active .progress-fill { width: 100%; }
    .nav-buttons { 
      position: absolute;
      top: 50%;
      left: -20px;
      right: -20px;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
    }
    .nav-btn {
      background: rgba(20, 19, 16, 0.95);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
      pointer-events: auto;
    }
    .nav-btn:hover { background: var(--bg-elevated); border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }
    .nav-btn svg { width: 16px; height: 16px; }
    .final-logo {
      font-size: 2rem;
      font-weight: 700;
      color: #FFFEEF;
      margin-bottom: 2rem;
    }
    .restart-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem 2rem;
      font-size: 1rem;
      color: var(--text-dim);
      cursor: pointer;
      margin-top: 1rem;
      font-family: inherit;
    }
    .restart-btn:hover { border-color: var(--accent); color: var(--accent); }
    .error-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .error-icon { font-size: 4rem; margin-bottom: 1rem; width: 80px; height: 80px; border-radius: 50%; background: var(--gradient-red); display: flex; align-items: center; justify-content: center; color: var(--text); font-weight: 700; }
    .error-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .error-message { color: var(--text-dim); margin-bottom: 2rem; max-width: 300px; }
    .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; width: 100%; margin-top: 1.5rem; }
    .summary-item { background: var(--bg-elevated); border-radius: 12px; padding: 1.25rem 1rem; text-align: center; border: 1px solid rgba(84, 74, 76, 0.4); }
    .summary-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .summary-item:nth-child(2) .summary-value { color: var(--green); }
    .summary-item:nth-child(3) .summary-value { color: var(--red); }
    .summary-label { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 1px; }
    .glow { animation: glow 2s ease-in-out infinite alternate; }
    @keyframes glow { from { filter: drop-shadow(0 0 10px rgba(255, 254, 239, 0.3)); } to { filter: drop-shadow(0 0 30px rgba(255, 254, 239, 0.5)); } }
    @media (max-width: 500px) {
      .logo { font-size: 2.5rem; }
      .card-value { font-size: 3rem; }
      .card-value.small { font-size: 1.75rem; }
      .card-wrapper { max-height: 85vh; }
      .story-card { padding: 1.5rem; }
      .tweet-media { height: 130px; }
      .card-label { font-size: 0.75rem; letter-spacing: 2px; }
      .profile-pic { width: 100px; height: 100px; }
    }
  </style>
</head>
<body>
  <!-- Falling Stars Background -->
  <div class="stars-container" id="stars"></div>
  <div id="root"></div>
  <script>
    // Create falling stars - exact copy from BulkGram leaderboard
    (function() {
      const container = document.getElementById('stars');
      const starCount = 25;
      
      // Check if star image exists
      const testImg = new Image();
      testImg.src = 'https://bulkgram.com/assets/star.png';
      
      testImg.onerror = function() {
        // Image failed to load - add fallback class to all stars
        document.querySelectorAll('.star').forEach(s => s.classList.add('no-image'));
        console.log('Star image not found, using CSS fallback');
      };
      
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        
        // Add reverse class to half the stars
        if (Math.random() > 0.5) {
          star.classList.add('reverse');
        }
        
        // Random properties - exact same as BulkGram
        const size = Math.random() * 15 + 10;
        const left = Math.random() * 100;
        const delay = Math.random() * 20;
        const duration = Math.random() * 15 + 20;
        const opacity = Math.random() * 0.3 + 0.15;
        
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${left}%`;
        star.style.animationDelay = `-${delay}s`;
        star.style.animationDuration = `${duration}s`;
        star.style.opacity = opacity;
        
        container.appendChild(star);
      }
    })();
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const { motion, AnimatePresence } = Motion;
    const API_URL = 'https://bulk-wrapped-api-production.up.railway.app';
    
    function formatNumber(num) {
      if (!num && num !== 0) return '0';
      num = Number(num);
      if (isNaN(num)) return '0';
      if (num >= 1000000) {
        const val = Math.round(num / 100000) / 10;
        return val + 'M';
      }
      if (num >= 1000) {
        const val = Math.round(num / 100) / 10;
        return val + 'K';
      }
      return String(num);
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '';
      try {
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      } catch { return dateStr; }
    }
    
    function AnimatedCounter({ value, duration = 2000 }) {
      const [displayValue, setDisplayValue] = useState(0);
      const numericValue = Number(value) || 0;
      useEffect(() => {
        setDisplayValue(0);
        let startTime;
        const animate = (timestamp) => {
          if (!startTime) startTime = timestamp;
          const progress = Math.min((timestamp - startTime) / duration, 1);
          const easeOut = 1 - Math.pow(1 - progress, 3);
          setDisplayValue(Math.floor(easeOut * numericValue));
          if (progress < 1) requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }, [numericValue, duration]);
      return <span>{formatNumber(displayValue)}</span>;
    }
    
    function LandingPage({ onSubmit }) {
      const [handle, setHandle] = useState('');
      return (
        <motion.div className="landing" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          <motion.h1 className="logo glow" initial={{ y: -50, opacity: 0 }} animate={{ y: 0, opacity: 1 }}>BULK WRAPPED</motion.h1>
          <motion.p className="tagline" initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.4 }}>Your @bulktrade journey on X</motion.p>
          <motion.form className="input-container" onSubmit={(e) => { e.preventDefault(); if (handle.trim()) onSubmit(handle.trim().replace('@', '')); }} initial={{ y: 40, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.7 }}>
            <input type="text" className="handle-input" placeholder="Enter your @handle" value={handle} onChange={(e) => setHandle(e.target.value)} />
            <button type="submit" className="generate-btn" disabled={!handle.trim()}>Generate My Wrapped</button>
          </motion.form>
          <motion.p className="api-disclaimer" initial={{ opacity: 0 }} animate={{ opacity: 0.6 }} transition={{ delay: 1 }}>
            BULK Wrapped works within Twitter API limits.<br/>
            Very active users like @kdotcrypto may see partial history.
          </motion.p>
        </motion.div>
      );
    }
    
    function LoadingScreen({ handle, progress, message }) {
      return (
        <motion.div className="loading-screen" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          <motion.p className="loading-handle" initial={{ scale: 0.8 }} animate={{ scale: 1 }}>@{handle}</motion.p>
          <div className="progress-container">
            <div className="progress-bar-bg">
              <motion.div className="progress-bar-fill" animate={{ width: `${progress}%` }} transition={{ duration: 0.3 }} />
            </div>
            <motion.div className="progress-percentage" key={progress} initial={{ scale: 1.2 }} animate={{ scale: 1 }}>{progress}%</motion.div>
            <motion.p className="progress-message" key={message} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }}>{message}</motion.p>
          </div>
          <div className="loading-spinner" />
        </motion.div>
      );
    }
    
    function ErrorScreen({ message, onRetry }) {
      return (
        <motion.div className="error-screen" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
          <div className="error-icon">!</div>
          <h2 className="error-title">Oops!</h2>
          <p className="error-message">{message || 'Something went wrong'}</p>
          <button className="generate-btn" onClick={onRetry}>Try Again</button>
        </motion.div>
      );
    }
    
    function TweetPreview({ tweet }) {
      if (!tweet) return null;
      return (
        <div className="tweet-preview">
          {tweet.media && <img src={tweet.media} alt="" className="tweet-media" onError={(e) => e.target.style.display = 'none'} />}
          <div className="tweet-body">
            {tweet.date && <div className="tweet-date">{formatDate(tweet.date)}</div>}
            <p className="tweet-text">{tweet.text}</p>
            <div className="tweet-stats">
              <span className="tweet-stat">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                {formatNumber(tweet.likes)}
              </span>
              <span className="tweet-stat">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/></svg>
                {formatNumber(tweet.views)}
              </span>
              {tweet.url && (
                <a 
                  href={tweet.url} 
                  target="_blank" 
                  rel="noopener noreferrer" 
                  className="tweet-link"
                  onClick={(e) => e.stopPropagation()}
                >
                  <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231z"/></svg>
                </a>
              )}
            </div>
          </div>
        </div>
      );
    }
    
    function TimelineStrip({ stats, currentIndex, totalCards }) {
      const progress = (currentIndex + 1) / totalCards;
      const currentPosts = Math.round((stats.total_posts || 0) * progress);
      const currentViews = Math.round((stats.total_views || 0) * progress);
      const currentLikes = Math.round((stats.total_likes || 0) * progress);
      
      const getProgressDate = () => {
        try {
          const firstDate = new Date(stats.first_post_date);
          const now = new Date();
          if (isNaN(firstDate.getTime())) return stats.first_post_date;
          const totalMs = now.getTime() - firstDate.getTime();
          const currentMs = firstDate.getTime() + (totalMs * progress);
          const currentDate = new Date(currentMs);
          return currentDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        } catch {
          return stats.first_post_date;
        }
      };
      
      return (
        <motion.div className="timeline-strip" initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }}>
          <div className="timeline-header">
            <span className="timeline-title">Your Journey</span>
            <motion.span className="timeline-date-range" key={currentIndex} initial={{ opacity: 0.5 }} animate={{ opacity: 1 }}>
              {getProgressDate()}
            </motion.span>
          </div>
          <div className="timeline-track">
            <motion.div className="timeline-line-progress" animate={{ width: `${progress * 100}%` }} transition={{ duration: 0.4 }} />
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-around', padding: '0.5rem 0', marginTop: '0.5rem' }}>
            <div style={{ textAlign: 'center' }}>
              <motion.div key={currentPosts} initial={{ scale: 1.2 }} animate={{ scale: 1 }} style={{ fontSize: '1rem', fontWeight: '700', color: '#FFFEEF' }}>
                {formatNumber(currentPosts)}
              </motion.div>
              <div style={{ fontSize: '0.55rem', color: 'var(--text-dim)', textTransform: 'uppercase' }}>Posts</div>
            </div>
            <div style={{ textAlign: 'center' }}>
              <motion.div key={currentViews} initial={{ scale: 1.2 }} animate={{ scale: 1 }} style={{ fontSize: '1rem', fontWeight: '700', color: '#00B481' }}>
                {formatNumber(currentViews)}
              </motion.div>
              <div style={{ fontSize: '0.55rem', color: '#00B481', textTransform: 'uppercase' }}>Views</div>
            </div>
            <div style={{ textAlign: 'center' }}>
              <motion.div key={currentLikes} initial={{ scale: 1.2 }} animate={{ scale: 1 }} style={{ fontSize: '1rem', fontWeight: '700', color: '#EF4A3C' }}>
                {formatNumber(currentLikes)}
              </motion.div>
              <div style={{ fontSize: '0.55rem', color: '#EF4A3C', textTransform: 'uppercase' }}>Likes</div>
            </div>
          </div>
        </motion.div>
      );
    }
    
    function StoryCard({ card, index, total, onDownload }) {
      // Theme-based styling - WHITE primary, GREEN for views, RED for likes
      const themeStyles = {
        default: {
          bgGlow: 'radial-gradient(circle at 50% 0%, rgba(255, 254, 239, 0.15) 0%, transparent 60%)',
          valueColor: '#FFFEEF',
          labelColor: 'var(--text-dim)',
          accentGlow: 'rgba(255, 254, 239, 0.2)'
        },
        green: {
          bgGlow: 'radial-gradient(circle at 50% 0%, rgba(0, 180, 129, 0.25) 0%, rgba(19, 74, 85, 0.15) 50%, transparent 70%)',
          valueColor: '#00B481',
          labelColor: '#00B481',
          accentGlow: 'rgba(0, 180, 129, 0.25)'
        },
        red: {
          bgGlow: 'radial-gradient(circle at 50% 0%, rgba(239, 74, 60, 0.25) 0%, rgba(110, 23, 66, 0.15) 50%, transparent 70%)',
          valueColor: '#EF4A3C',
          labelColor: '#EF4A3C',
          accentGlow: 'rgba(239, 74, 60, 0.25)'
        }
      };
      const theme = themeStyles[card.theme] || themeStyles.default;
      
      return (
        <motion.div className="story-card" id={`card-${index}`} initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 0.95 }} transition={{ duration: 0.3 }}>
          {/* Small PFP + handle in top left */}
          {card.profileImage && card.type !== 'intro' && card.type !== 'final' && (
            <div style={{
              position: 'absolute',
              top: '1rem',
              left: '1rem',
              display: 'flex',
              alignItems: 'center',
              gap: '0.5rem',
              zIndex: 5
            }}>
              <img 
                src={card.profileImage} 
                alt="" 
                style={{
                  width: '32px',
                  height: '32px',
                  borderRadius: '50%',
                  objectFit: 'cover',
                  border: '2px solid rgba(255, 255, 255, 0.2)'
                }}
                onError={(e) => e.target.style.display = 'none'}
              />
              <span style={{
                fontSize: '0.75rem',
                color: 'var(--text-dim)',
                fontWeight: '500'
              }}>@{card.handle || ''}</span>
            </div>
          )}
          
          <div className="card-gradient" style={{ background: theme.bgGlow }} />
          
          {/* Download button - bottom center */}
          <button 
            className="download-btn"
            onClick={(e) => { e.stopPropagation(); onDownload && onDownload(index); }}
            title="Download card"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
          
          <div className="card-content" style={{ position: 'relative', zIndex: 1 }}>
            
            {card.type === 'intro' && (
              <>
                <p className="card-label">YOUR BULK JOURNEY</p>
                {card.profileImage ? (
                  <motion.img src={card.profileImage} alt="" className="profile-pic" initial={{ scale: 0.5 }} animate={{ scale: 1 }} onError={(e) => e.target.style.display = 'none'} />
                ) : (
                  <div className="profile-pic-placeholder">?</div>
                )}
                <motion.h2 className="card-value" style={{ fontSize: '2.5rem', color: theme.valueColor }} initial={{ scale: 0.5 }} animate={{ scale: 1 }}>@{card.handle}</motion.h2>
                <p className="card-subtitle">Let's see how you've been supporting $BULK</p>
              </>
            )}
            
            {card.type === 'first_post' && (
              <>
                <p className="card-label" style={{ color: theme.labelColor }}>JOURNEY STARTED</p>
                <motion.h2 className="card-value small" style={{ color: theme.valueColor }} initial={{ scale: 0.5 }} animate={{ scale: 1 }}>{card.date}</motion.h2>
                <p className="card-subtitle">Your first BULK mention</p>
                {card.tweet && <TweetPreview tweet={card.tweet} />}
              </>
            )}
            
            {card.type === 'stat' && (
              <>
                <p className="card-label" style={{ color: theme.labelColor }}>{card.label}</p>
                <motion.h2 className={`card-value ${card.small ? 'small' : ''}`} style={{ color: theme.valueColor, textShadow: `0 0 40px ${theme.accentGlow}` }} initial={{ scale: 0.3 }} animate={{ scale: 1 }}>
                  {card.animate ? <AnimatedCounter value={card.value} /> : card.value}
                </motion.h2>
                <p className="card-subtitle">{card.subtitle}</p>
              </>
            )}
            
            {card.type === 'tweet' && (
              <>
                <p className="card-label" style={{ color: theme.labelColor }}>{card.label}</p>
                <h2 className="card-title" style={{ color: theme.valueColor }}>{card.title}</h2>
                {card.tweet && <TweetPreview tweet={card.tweet} />}
              </>
            )}
            
            {card.type === 'final' && (
              <>
                {card.profileImage && <img src={card.profileImage} alt="" className="profile-pic" style={{ width: '80px', height: '80px', marginBottom: '1rem' }} onError={(e) => e.target.style.display = 'none'} />}
                <h2 className="final-logo">BULK WRAPPED</h2>
                <p className="card-label">@{card.handle}</p>
                <div className="summary-grid">
                  {[
                    { value: card.stats.posts, label: 'Posts' },
                    { value: card.stats.views, label: 'Views' },
                    { value: card.stats.likes, label: 'Likes' },
                    { value: card.stats.streak, label: 'Month Streak' }
                  ].map((item, i) => (
                    <motion.div key={i} className="summary-item" initial={{ scale: 0.8 }} animate={{ scale: 1 }} transition={{ delay: 0.1 * i }}>
                      <div className="summary-value">{item.value}</div>
                      <div className="summary-label">{item.label}</div>
                    </motion.div>
                  ))}
                </div>
              </>
            )}
          </div>
        </motion.div>
      );
    }
    
    function StoryView({ stats, handle, user, onRestart }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const profileImage = user?.profile_image || stats?.profile_image;
      
      const firstTweet = stats.first_post ? { 
        text: stats.first_post.text, 
        date: stats.first_post.date, 
        likes: stats.first_post.likes || 0, 
        views: stats.first_post.views || 0,
        media: stats.first_post.media,
        url: stats.first_post.url
      } : null;
      
      // Cards with balanced themes: WHITE primary, GREEN for views, RED for likes
      const cards = [
        { type: 'intro', handle, profileImage, theme: 'default' },
        { type: 'first_post', date: stats.first_post_date || 'Unknown', tweet: firstTweet, handle, profileImage, theme: 'default' },
        { type: 'stat', label: 'TOTAL BULK POSTS', value: stats.total_posts, subtitle: 'Times you mentioned BULK', animate: true, handle, profileImage, theme: 'default' },
        { type: 'stat', label: 'TOTAL VIEWS', value: stats.total_views, subtitle: 'People saw your BULK content', animate: true, handle, profileImage, theme: 'green' },
        { type: 'stat', label: 'TOTAL LIKES', value: stats.total_likes, subtitle: 'Hearts on your BULK posts', animate: true, handle, profileImage, theme: 'red' },
        { type: 'stat', label: 'POSTING STREAK', value: stats.posting_streak + ' months', subtitle: 'Consecutive months supporting BULK', handle, profileImage, theme: 'default' }
      ];
      
      if (stats.most_viral_post) {
        cards.push({ type: 'tweet', label: 'YOUR VIRAL HIT', title: formatNumber(stats.most_viral_post.views) + ' views', tweet: stats.most_viral_post, handle, profileImage, theme: 'green' });
      }
      
      // Always show most liked post (even if same as most viral)
      if (stats.most_liked_post) {
        cards.push({ type: 'tweet', label: 'MOST LOVED POST', title: formatNumber(stats.most_liked_post.likes) + ' likes', tweet: stats.most_liked_post, handle, profileImage, theme: 'red' });
      }
      
      cards.push({
        type: 'final',
        handle,
        profileImage,
        theme: 'default',
        stats: {
          posts: formatNumber(stats.total_posts),
          views: formatNumber(stats.total_views),
          likes: formatNumber(stats.total_likes),
          streak: stats.posting_streak
        }
      });
      
      // Debounce navigation to prevent lag from rapid clicking
      const isNavigating = React.useRef(false);
      const navigationTimeout = React.useRef(null);
      
      const goNext = () => { 
        if (isNavigating.current || currentIndex >= cards.length - 1) return;
        isNavigating.current = true;
        setCurrentIndex(currentIndex + 1);
        // Allow next navigation after animation completes
        clearTimeout(navigationTimeout.current);
        navigationTimeout.current = setTimeout(() => { isNavigating.current = false; }, 350);
      };
      
      const goPrev = () => { 
        if (isNavigating.current || currentIndex <= 0) return;
        isNavigating.current = true;
        setCurrentIndex(currentIndex - 1);
        clearTimeout(navigationTimeout.current);
        navigationTimeout.current = setTimeout(() => { isNavigating.current = false; }, 350);
      };
      
      // Cleanup timeout on unmount
      React.useEffect(() => {
        return () => clearTimeout(navigationTimeout.current);
      }, []);
      
      const downloadCard = async (cardIndex) => {
        const cardElement = document.getElementById(`card-${cardIndex}`);
        if (!cardElement || !window.html2canvas) return;
        
        try {
          // Hide the download button temporarily
          const downloadBtn = cardElement.querySelector('.download-btn');
          if (downloadBtn) downloadBtn.style.display = 'none';
          
          const canvas = await window.html2canvas(cardElement, {
            backgroundColor: '#141310',
            scale: 2,
            useCORS: true,
            allowTaint: true,
            logging: false
          });
          
          // Show the button again
          if (downloadBtn) downloadBtn.style.display = 'flex';
          
          // Download
          const link = document.createElement('a');
          link.download = `bulk-wrapped-${handle}-${cardIndex + 1}.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch (err) {
          console.error('Download failed:', err);
        }
      };
      
      useEffect(() => {
        const handleKey = (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
          else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [currentIndex]);
      
      return (
        <motion.div className="story-container" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
          <div className="card-wrapper" onClick={() => goNext()} style={{ cursor: currentIndex < cards.length - 1 && !isNavigating.current ? 'pointer' : 'default', position: 'relative' }}>
            <AnimatePresence mode="wait">
              <StoryCard key={currentIndex} card={cards[currentIndex]} index={currentIndex} total={cards.length} onDownload={downloadCard} />
            </AnimatePresence>
            <div className="nav-buttons">
              <button className="nav-btn" onClick={(e) => { e.stopPropagation(); goPrev(); }} disabled={currentIndex === 0}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button className="nav-btn" onClick={(e) => { e.stopPropagation(); goNext(); }} disabled={currentIndex === cards.length - 1}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
          </div>
          <TimelineStrip stats={stats} currentIndex={currentIndex} totalCards={cards.length} />
          <div className="progress-bar">
            {cards.map((_, i) => (
              <div key={i} className={`progress-segment ${i < currentIndex ? 'completed' : ''} ${i === currentIndex ? 'active' : ''}`} onClick={() => {
                if (isNavigating.current || i === currentIndex) return;
                isNavigating.current = true;
                setCurrentIndex(i);
                clearTimeout(navigationTimeout.current);
                navigationTimeout.current = setTimeout(() => { isNavigating.current = false; }, 350);
              }}>
                <div className="progress-fill" style={{ width: i <= currentIndex ? '100%' : '0%' }} />
              </div>
            ))}
          </div>
          {currentIndex === cards.length - 1 && (
            <button className="restart-btn" onClick={onRestart}>Try Another Handle</button>
          )}
        </motion.div>
      );
    }
    
    function App() {
      const [screen, setScreen] = useState('landing');
      const [handle, setHandle] = useState('');
      const [stats, setStats] = useState(null);
      const [user, setUser] = useState(null);
      const [error, setError] = useState('');
      const [progress, setProgress] = useState(0);
      const [loadingMessage, setLoadingMessage] = useState('Connecting...');
      
      const handleSubmit = async (inputHandle) => {
        setHandle(inputHandle);
        setScreen('loading');
        setProgress(0);
        setLoadingMessage('Connecting...');
        
        let sseWorking = false;
        const es = new EventSource(`${API_URL}/api/wrapped/stream?handle=${encodeURIComponent(inputHandle)}`);
        const timeout = setTimeout(() => { if (!sseWorking) { es.close(); fallbackFetch(inputHandle); } }, 5000);
        
        es.onmessage = (event) => {
          sseWorking = true;
          clearTimeout(timeout);
          try {
            const data = JSON.parse(event.data);
            if (data.progress) setProgress(data.progress);
            if (data.message) {
              let msg = data.message;
              if (data.tweets_found !== undefined && data.tweets_found > 0) {
                msg += ` (${data.tweets_found} scanned)`;
              }
              setLoadingMessage(msg);
            }
            if (data.step === 'error') { es.close(); setError(data.error); setScreen('error'); }
            if (data.step === 'complete') {
              es.close();
              setProgress(100);
              setLoadingMessage('Done!');
              setTimeout(() => { setStats(data.stats); setUser(data.user); setScreen('story'); }, 250);
            }
          } catch (e) {}
        };
        
        es.onerror = () => { clearTimeout(timeout); es.close(); if (!sseWorking) fallbackFetch(inputHandle); };
      };
      
      const fallbackFetch = async (inputHandle) => {
        const start = Date.now();
        const messages = [
          'Scanning your timeline...',
          'Finding BULK mentions...',
          'Looking for gBULK posts...',
          'Calculating your impact...',
          'Preparing your wrapped...'
        ];
        let msgIdx = 0;
        
        const msgInterval = setInterval(() => {
          msgIdx = (msgIdx + 1) % messages.length;
          setLoadingMessage(messages[msgIdx]);
        }, 2500);
        
        const progressInterval = setInterval(() => {
          const elapsed = Date.now() - start;
          const p = Math.min(Math.floor((elapsed / 120000) * 95), 95);
          setProgress(p);
        }, 800);
        
        try {
          const r = await fetch(`${API_URL}/api/wrapped`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ handle: inputHandle }) });
          clearInterval(msgInterval);
          clearInterval(progressInterval);
          const d = await r.json();
          if (!r.ok) throw new Error(d.error || 'Failed');
          setProgress(100);
          setLoadingMessage('Done!');
          setTimeout(() => { setStats(d.stats); setUser(d.user); setScreen('story'); }, 300);
        } catch (e) { 
          clearInterval(msgInterval); 
          clearInterval(progressInterval); 
          setError(e.message); 
          setScreen('error'); 
        }
      };
      
      const handleRestart = () => { setScreen('landing'); setHandle(''); setStats(null); setUser(null); setProgress(0); };
      
      return (
        <AnimatePresence mode="wait">
          {screen === 'landing' && <LandingPage key="landing" onSubmit={handleSubmit} />}
          {screen === 'loading' && <LoadingScreen key="loading" handle={handle} progress={progress} message={loadingMessage} />}
          {screen === 'story' && stats && <StoryView key="story" stats={stats} handle={handle} user={user} onRestart={handleRestart} />}
          {screen === 'error' && <ErrorScreen key="error" message={error} onRetry={handleRestart} />}
        </AnimatePresence>
      );
    }
    
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
