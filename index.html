<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BULK Wrapped</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000000;
      --bg-card: #0a0a0a;
      --bg-elevated: #111111;
      --text: #ffffff;
      --text-dim: #888888;
      --accent: #00ff88;
      --accent-secondary: #00d4ff;
      --gradient-1: linear-gradient(135deg, #00ff88 0%, #00d4ff 100%);
      --gradient-2: linear-gradient(135deg, #ff6b6b 0%, #ffa500 100%);
      --gradient-3: linear-gradient(135deg, #a855f7 0%, #ec4899 100%);
      --gradient-4: linear-gradient(135deg, #3b82f6 0%, #06b6d4 100%);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; }

    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .logo {
      font-size: 3rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 1.1rem;
      margin-bottom: 3rem;
    }

    .input-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
    }

    .handle-input {
      background: var(--bg-elevated);
      border: 2px solid #222;
      border-radius: 16px;
      padding: 1.25rem 1.5rem;
      font-size: 1.1rem;
      color: var(--text);
      font-family: inherit;
      text-align: center;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .handle-input:focus { 
      outline: none; 
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
    }
    .handle-input::placeholder { color: var(--text-dim); }

    .generate-btn {
      background: var(--gradient-1);
      border: none;
      border-radius: 16px;
      padding: 1.25rem 2rem;
      font-size: 1.1rem;
      font-weight: 700;
      color: #000;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }

    .generate-btn:hover { 
      transform: scale(1.02);
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
    }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Loading Screen with Progress */
    .loading-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .loading-handle {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 2rem;
    }

    .progress-container {
      width: 100%;
      max-width: 350px;
      margin-bottom: 2rem;
    }

    .progress-bar-bg {
      width: 100%;
      height: 8px;
      background: var(--bg-elevated);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--gradient-1);
      border-radius: 10px;
      transition: width 0.3s ease;
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
    }

    .progress-percentage {
      font-size: 2.5rem;
      font-weight: 800;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .progress-message {
      color: var(--text-dim);
      font-size: 1rem;
      min-height: 24px;
    }

    .tweets-count {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-top: 1rem;
      opacity: 0.7;
    }

    /* Story Container */
    .story-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    .card-wrapper {
      width: 100%;
      max-width: 420px;
      aspect-ratio: 9/16;
      max-height: 90vh;
      position: relative;
      perspective: 1000px;
    }

    .story-card {
      position: absolute;
      inset: 0;
      background: var(--bg-card);
      border-radius: 24px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      border: 1px solid #222;
      overflow: hidden;
    }

    .card-gradient {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 250px;
      opacity: 0.4;
      z-index: 0;
      filter: blur(40px);
    }

    .card-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      width: 100%;
    }

    .card-number {
      position: absolute;
      top: 1rem; right: 1rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      background: rgba(255,255,255,0.05);
      padding: 0.3rem 0.6rem;
      border-radius: 20px;
    }

    .card-label {
      font-size: 0.85rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 1.5rem;
    }

    .card-value {
      font-size: 4rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    .card-value.gradient { background: var(--gradient-1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-value.gradient-2 { background: var(--gradient-2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-value.gradient-3 { background: var(--gradient-3); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-value.gradient-4 { background: var(--gradient-4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .card-value.small { font-size: 2rem; }

    .card-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 1rem; }
    .card-subtitle { font-size: 1rem; color: var(--text-dim); max-width: 85%; line-height: 1.5; }

    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      object-fit: cover;
      margin-bottom: 1.5rem;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
    }

    .profile-pic-placeholder {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--accent);
      background: var(--bg-elevated);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin-bottom: 1.5rem;
    }

    /* Tweet Preview */
    .tweet-preview {
      background: var(--bg-elevated);
      border-radius: 16px;
      margin-top: 1.5rem;
      width: 100%;
      text-align: left;
      border: 1px solid #222;
      overflow: hidden;
    }

    .tweet-media {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-bottom: 1px solid #222;
      background: #111;
    }

    .tweet-body { padding: 1rem; }

    .tweet-text {
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tweet-stats { display: flex; gap: 1.5rem; font-size: 0.85rem; color: var(--text-dim); }
    .tweet-stat { display: flex; align-items: center; gap: 0.4rem; }
    .tweet-stat svg { width: 16px; height: 16px; }

    /* Timeline Strip */
    .timeline-strip {
      width: 100%;
      padding: 1rem 0;
    }

    .timeline-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      text-align: center;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .timeline-track {
      position: relative;
      padding: 0 1rem;
    }

    .timeline-line {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, var(--accent), var(--accent-secondary));
      transform: translateX(-50%);
    }

    .timeline-event {
      display: flex;
      margin-bottom: 1.5rem;
      position: relative;
    }

    .timeline-event:nth-child(odd) { flex-direction: row; }
    .timeline-event:nth-child(even) { flex-direction: row-reverse; }

    .timeline-dot {
      position: absolute;
      left: 50%;
      top: 0.5rem;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px var(--accent);
      z-index: 2;
    }

    .timeline-content {
      width: 45%;
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      border: 1px solid #222;
    }

    .timeline-event:nth-child(odd) .timeline-content { margin-right: auto; text-align: right; }
    .timeline-event:nth-child(even) .timeline-content { margin-left: auto; text-align: left; }

    .timeline-date {
      font-size: 0.7rem;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .timeline-event-title {
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .timeline-event-desc {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    /* Bi-weekly Chart */
    .biweekly-chart {
      width: 100%;
      margin-top: 1rem;
    }

    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 100px;
      padding: 0 0.5rem;
    }

    .chart-bar {
      flex: 1;
      background: var(--gradient-1);
      border-radius: 4px 4px 0 0;
      min-height: 4px;
      position: relative;
    }

    .chart-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    /* Progress bar at bottom */
    .progress-bar {
      display: flex;
      gap: 4px;
      margin-top: 1.5rem;
      width: 100%;
      max-width: 300px;
    }

    .progress-segment {
      flex: 1;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
      cursor: pointer;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-segment.completed .progress-fill,
    .progress-segment.active .progress-fill { width: 100%; }

    .nav-buttons { display: flex; gap: 1rem; margin-top: 1.5rem; }

    .nav-btn {
      background: var(--bg-elevated);
      border: 1px solid #333;
      border-radius: 50%;
      width: 48px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text);
    }

    .nav-btn:hover { background: #222; border-color: var(--accent); color: var(--accent); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn svg { width: 20px; height: 20px; }

    .final-logo {
      font-size: 2rem;
      font-weight: 900;
      background: var(--gradient-1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }

    .share-btn {
      background: var(--gradient-1);
      border: none;
      border-radius: 12px;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #000;
      cursor: pointer;
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 2rem;
      font-family: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .share-btn:hover { 
      transform: scale(1.05);
      box-shadow: 0 10px 40px rgba(0, 255, 136, 0.3);
    }

    .restart-btn {
      background: transparent;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1rem 2rem;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-dim);
      cursor: pointer;
      margin-top: 1rem;
      font-family: inherit;
    }

    .restart-btn:hover { border-color: var(--text-dim); color: var(--text); }

    .error-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .error-icon { font-size: 4rem; margin-bottom: 1rem; }
    .error-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .error-message { color: var(--text-dim); margin-bottom: 2rem; max-width: 300px; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      width: 100%;
      margin-top: 1.5rem;
    }

    .summary-item {
      background: var(--bg-elevated);
      border-radius: 12px;
      padding: 1.25rem 1rem;
      text-align: center;
      border: 1px solid #222;
    }

    .summary-value { font-size: 1.5rem; font-weight: 700; color: var(--accent); }
    .summary-label { font-size: 0.7rem; color: var(--text-dim); margin-top: 0.25rem; text-transform: uppercase; letter-spacing: 1px; }

    .glow { animation: glow 2s ease-in-out infinite alternate; }
    @keyframes glow { from { filter: drop-shadow(0 0 10px rgba(0,255,136,0.5)); } to { filter: drop-shadow(0 0 30px rgba(0,255,136,0.8)); } }

    @media (max-width: 500px) {
      .logo { font-size: 2.5rem; }
      .card-value { font-size: 3rem; }
      .card-value.small { font-size: 1.75rem; }
      .card-wrapper { max-height: 85vh; }
      .story-card { padding: 1.5rem; }
      .tweet-media { height: 130px; }
      .profile-pic { width: 100px; height: 100px; }
      .timeline-content { padding: 0.5rem 0.75rem; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = Motion;

    const API_URL = 'https://bulk-wrapped-api-production.up.railway.app';

    function formatNumber(num) {
      if (!num) return '0';
      if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
      if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
      return num.toLocaleString();
    }

    function AnimatedCounter({ value, duration = 2000 }) {
      const [displayValue, setDisplayValue] = useState(0);
      const numericValue = parseInt(String(value).replace(/[^0-9]/g, '')) || 0;
      const suffix = String(value).replace(/[0-9.,]/g, '');

      useEffect(() => {
        setDisplayValue(0);
        let startTime;
        const animate = (timestamp) => {
          if (!startTime) startTime = timestamp;
          const progress = Math.min((timestamp - startTime) / duration, 1);
          const easeOut = 1 - Math.pow(1 - progress, 3);
          setDisplayValue(Math.floor(easeOut * numericValue));
          if (progress < 1) requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);
      }, [numericValue, duration]);

      return <span>{displayValue.toLocaleString()}{suffix}</span>;
    }

    function LandingPage({ onSubmit }) {
      const [handle, setHandle] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (handle.trim()) onSubmit(handle.trim().replace('@', ''));
      };

      return (
        <motion.div className="landing" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          <motion.h1 className="logo glow" initial={{ y: -50, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.1, type: "spring" }}>
            BULK WRAPPED
          </motion.h1>
          <motion.p className="tagline" initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.4 }}>
            Your @bulktrade journey on X
          </motion.p>

          <motion.form className="input-container" onSubmit={handleSubmit} initial={{ y: 40, opacity: 0 }} animate={{ y: 0, opacity: 1 }} transition={{ delay: 0.7 }}>
            <input
              type="text"
              className="handle-input"
              placeholder="Enter your @handle"
              value={handle}
              onChange={(e) => setHandle(e.target.value)}
            />
            <motion.button type="submit" className="generate-btn" disabled={!handle.trim()} whileHover={{ scale: 1.03 }} whileTap={{ scale: 0.97 }}>
              Generate My Wrapped
            </motion.button>
          </motion.form>
        </motion.div>
      );
    }

    function LoadingScreen({ handle, progress, message, tweetsFound }) {
      return (
        <motion.div className="loading-screen" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          <motion.p className="loading-handle" initial={{ scale: 0.8 }} animate={{ scale: 1 }}>
            @{handle}
          </motion.p>
          
          <div className="progress-container">
            <div className="progress-bar-bg">
              <motion.div 
                className="progress-bar-fill" 
                initial={{ width: '0%' }}
                animate={{ width: `${progress}%` }}
                transition={{ duration: 0.3 }}
              />
            </div>
            
            <motion.div 
              className="progress-percentage"
              key={progress}
              initial={{ scale: 1.2 }}
              animate={{ scale: 1 }}
            >
              {progress}%
            </motion.div>
            
            <motion.p 
              className="progress-message"
              key={message}
              initial={{ opacity: 0, y: 10 }}
              animate={{ opacity: 1, y: 0 }}
            >
              {message}
            </motion.p>
            
            {tweetsFound > 0 && (
              <motion.p className="tweets-count" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
                {tweetsFound} tweets scanned
              </motion.p>
            )}
          </div>
        </motion.div>
      );
    }

    function ErrorScreen({ message, onRetry }) {
      return (
        <motion.div className="error-screen" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
          <div className="error-icon">😔</div>
          <h2 className="error-title">Oops!</h2>
          <p className="error-message">{message || 'Something went wrong'}</p>
          <button className="generate-btn" onClick={onRetry}>Try Again</button>
        </motion.div>
      );
    }

    function TimelineStrip({ timeline }) {
      const events = timeline.filter(e => e.type !== 'biweekly_chart');
      const chartData = timeline.find(e => e.type === 'biweekly_chart')?.data || [];
      
      const maxViews = Math.max(...chartData.map(d => d.views), 1);

      return (
        <div className="timeline-strip">
          <h3 className="timeline-title">📅 Your BULK Journey</h3>
          
          {/* Bi-weekly chart */}
          {chartData.length > 0 && (
            <motion.div className="biweekly-chart" initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.3 }}>
              <div className="chart-bars">
                {chartData.slice(-10).map((period, i) => (
                  <motion.div
                    key={i}
                    className="chart-bar"
                    initial={{ height: 0 }}
                    animate={{ height: `${Math.max((period.views / maxViews) * 100, 5)}%` }}
                    transition={{ delay: 0.1 * i, duration: 0.5 }}
                    title={`${period.period}: ${formatNumber(period.views)} views`}
                  >
                    {i % 2 === 0 && <span className="chart-label">{period.period}</span>}
                  </motion.div>
                ))}
              </div>
              <p style={{ textAlign: 'center', fontSize: '0.75rem', color: 'var(--text-dim)', marginTop: '1.5rem' }}>
                Views per 2-week period
              </p>
            </motion.div>
          )}

          {/* Timeline events */}
          <div className="timeline-track" style={{ marginTop: '2rem' }}>
            <div className="timeline-line" />
            {events.slice(0, 5).map((event, i) => (
              <motion.div
                key={i}
                className="timeline-event"
                initial={{ opacity: 0, x: i % 2 === 0 ? -30 : 30 }}
                animate={{ opacity: 1, x: 0 }}
                transition={{ delay: 0.2 + i * 0.15 }}
              >
                <div className="timeline-dot" />
                <div className="timeline-content">
                  <div className="timeline-date">{event.date}</div>
                  <div className="timeline-event-title">{event.title}</div>
                  <div className="timeline-event-desc">{event.description}</div>
                </div>
              </motion.div>
            ))}
          </div>
        </div>
      );
    }

    function StoryCard({ card, index, total, timeline }) {
      const gradients = ['gradient', 'gradient-2', 'gradient-3', 'gradient-4'];
      const gradient = gradients[index % gradients.length];
      const bgGradients = [
        'radial-gradient(circle at 50% 0%, rgba(0,255,136,0.4) 0%, transparent 60%)',
        'radial-gradient(circle at 50% 0%, rgba(255,107,107,0.4) 0%, transparent 60%)',
        'radial-gradient(circle at 50% 0%, rgba(168,85,247,0.4) 0%, transparent 60%)',
        'radial-gradient(circle at 50% 0%, rgba(59,130,246,0.4) 0%, transparent 60%)'
      ];

      return (
        <motion.div
          className="story-card"
          initial={{ opacity: 0, scale: 0.9, rotateX: 10 }}
          animate={{ opacity: 1, scale: 1, rotateX: 0 }}
          exit={{ opacity: 0, scale: 0.9, rotateX: -10 }}
          transition={{ duration: 0.5 }}
        >
          <div className="card-gradient" style={{ background: bgGradients[index % bgGradients.length] }} />
          <div className="card-content">
            <span className="card-number">{index + 1}/{total}</span>
            
            {card.type === 'intro' && (
              <>
                <p className="card-label">YOUR BULK JOURNEY</p>
                {card.profileImage ? (
                  <motion.img src={card.profileImage} alt="" className="profile-pic" initial={{ scale: 0.5 }} animate={{ scale: 1 }} onError={(e) => e.target.style.display = 'none'} />
                ) : (
                  <div className="profile-pic-placeholder">👤</div>
                )}
                <motion.h2 className={`card-value ${gradient}`} style={{ fontSize: '2.5rem' }} initial={{ scale: 0.5 }} animate={{ scale: 1 }}>
                  @{card.handle}
                </motion.h2>
                <p className="card-subtitle">Let's see how you've been supporting $BULK</p>
              </>
            )}

            {card.type === 'stat' && (
              <>
                <p className="card-label">{card.label}</p>
                <motion.h2 className={`card-value ${card.small ? 'small' : ''} ${gradient}`} initial={{ scale: 0.3 }} animate={{ scale: 1 }}>
                  {card.animate ? <AnimatedCounter value={card.value} /> : card.value}
                </motion.h2>
                <p className="card-subtitle">{card.subtitle}</p>
              </>
            )}

            {card.type === 'tweet' && (
              <>
                <p className="card-label">{card.label}</p>
                <h2 className="card-title">{card.title}</h2>
                {card.tweet && (
                  <div className="tweet-preview">
                    {card.tweet.media && <img src={card.tweet.media} alt="" className="tweet-media" onError={(e) => e.target.style.display = 'none'} />}
                    <div className="tweet-body">
                      <p className="tweet-text">{card.tweet.text}</p>
                      <div className="tweet-stats">
                        <span className="tweet-stat">
                          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                          {formatNumber(card.tweet.likes)}
                        </span>
                        <span className="tweet-stat">
                          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                          {formatNumber(card.tweet.views)}
                        </span>
                      </div>
                    </div>
                  </div>
                )}
              </>
            )}

            {card.type === 'timeline' && timeline && (
              <TimelineStrip timeline={timeline} />
            )}

            {card.type === 'final' && (
              <>
                {card.profileImage && <img src={card.profileImage} alt="" className="profile-pic" style={{ width: '80px', height: '80px', marginBottom: '1rem' }} onError={(e) => e.target.style.display = 'none'} />}
                <h2 className="final-logo glow">BULK WRAPPED</h2>
                <p className="card-label">@{card.handle}</p>
                <div className="summary-grid">
                  {[
                    { value: card.stats.posts, label: 'Posts' },
                    { value: card.stats.views, label: 'Views' },
                    { value: card.stats.likes, label: 'Likes' },
                    { value: card.stats.streak, label: 'Month Streak' }
                  ].map((item, i) => (
                    <motion.div key={i} className="summary-item" initial={{ scale: 0.8 }} animate={{ scale: 1 }} transition={{ delay: 0.1 * i }}>
                      <div className="summary-value">{item.value}</div>
                      <div className="summary-label">{item.label}</div>
                    </motion.div>
                  ))}
                </div>
                <button className="share-btn" onClick={() => {
                  const text = `My BULK Wrapped 🎁\n\n📝 ${card.stats.posts} posts\n👀 ${card.stats.views} views\n❤️ ${card.stats.likes} likes\n🔥 ${card.stats.streak} month streak\n\nGenerate yours 👇`;
                  window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
                }}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                  Share on X
                </button>
              </>
            )}
          </div>
        </motion.div>
      );
    }

    function StoryView({ stats, handle, user, timeline, onRestart }) {
      const [currentIndex, setCurrentIndex] = useState(0);
      const profileImage = user?.profile_image || stats?.profile_image;

      const cards = [
        { type: 'intro', handle, profileImage },
        { type: 'stat', label: 'YOUR JOURNEY STARTED', value: stats.first_post_date || 'Unknown', subtitle: 'When you first mentioned @bulktrade', small: true },
        { type: 'stat', label: 'TOTAL BULK POSTS', value: String(stats.total_posts), subtitle: 'Times you mentioned BULK', animate: true },
        { type: 'stat', label: 'TOTAL VIEWS', value: formatNumber(stats.total_views), subtitle: 'People saw your BULK content', animate: true },
        { type: 'stat', label: 'TOTAL LIKES', value: formatNumber(stats.total_likes), subtitle: 'Hearts on your BULK posts', animate: true },
        { type: 'stat', label: 'POSTING STREAK', value: stats.posting_streak + ' months', subtitle: 'Consecutive months supporting BULK' }
      ];

      if (stats.most_viral_post) {
        cards.push({ type: 'tweet', label: 'YOUR VIRAL HIT', title: formatNumber(stats.most_viral_post.views) + ' views 🔥', tweet: stats.most_viral_post });
      }
      
      if (stats.most_liked_post && stats.most_liked_post.text !== stats.most_viral_post?.text) {
        cards.push({ type: 'tweet', label: 'MOST LOVED POST', title: formatNumber(stats.most_liked_post.likes) + ' likes ❤️', tweet: stats.most_liked_post });
      }

      // Add timeline card
      if (timeline && timeline.length > 0) {
        cards.push({ type: 'timeline' });
      }
      
      cards.push({ 
        type: 'final', 
        handle,
        profileImage,
        stats: { 
          posts: formatNumber(stats.total_posts), 
          views: formatNumber(stats.total_views), 
          likes: formatNumber(stats.total_likes), 
          streak: stats.posting_streak 
        } 
      });

      const goNext = () => { if (currentIndex < cards.length - 1) setCurrentIndex(currentIndex + 1); };
      const goPrev = () => { if (currentIndex > 0) setCurrentIndex(currentIndex - 1); };

      useEffect(() => {
        const handleKey = (e) => {
          if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goNext(); }
          else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [currentIndex]);

      return (
        <motion.div className="story-container" initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
          <div className="card-wrapper" onClick={goNext} style={{ cursor: currentIndex < cards.length - 1 ? 'pointer' : 'default' }}>
            <AnimatePresence mode="wait">
              <StoryCard key={currentIndex} card={cards[currentIndex]} index={currentIndex} total={cards.length} timeline={timeline} />
            </AnimatePresence>
          </div>

          <div className="progress-bar">
            {cards.map((_, i) => (
              <div key={i} className={`progress-segment ${i < currentIndex ? 'completed' : ''} ${i === currentIndex ? 'active' : ''}`} onClick={() => setCurrentIndex(i)}>
                <div className="progress-fill" style={{ width: i <= currentIndex ? '100%' : '0%' }} />
              </div>
            ))}
          </div>

          <div className="nav-buttons">
            <button className="nav-btn" onClick={(e) => { e.stopPropagation(); goPrev(); }} disabled={currentIndex === 0}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <button className="nav-btn" onClick={(e) => { e.stopPropagation(); goNext(); }} disabled={currentIndex === cards.length - 1}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>

          {currentIndex === cards.length - 1 && (
            <button className="restart-btn" onClick={onRestart}>Try Another Handle</button>
          )}
        </motion.div>
      );
    }

    function App() {
      const [screen, setScreen] = useState('landing');
      const [handle, setHandle] = useState('');
      const [stats, setStats] = useState(null);
      const [user, setUser] = useState(null);
      const [timeline, setTimeline] = useState(null);
      const [error, setError] = useState('');
      const [progress, setProgress] = useState(0);
      const [loadingMessage, setLoadingMessage] = useState('Starting...');
      const [tweetsFound, setTweetsFound] = useState(0);

      const handleSubmit = async (inputHandle) => {
        setHandle(inputHandle);
        setScreen('loading');
        setError('');
        setProgress(0);
        setTweetsFound(0);
        setLoadingMessage('Connecting...');

        try {
          // Use Server-Sent Events for progress
          const eventSource = new EventSource(`${API_URL}/api/wrapped/stream?handle=${encodeURIComponent(inputHandle)}`);
          
          eventSource.onmessage = (event) => {
            try {
              const data = JSON.parse(event.data);
              
              if (data.step === 'error') {
                eventSource.close();
                setError(data.error);
                setScreen('error');
                return;
              }
              
              if (data.progress) setProgress(data.progress);
              if (data.message) setLoadingMessage(data.message);
              if (data.tweets_found) setTweetsFound(data.tweets_found);
              
              if (data.step === 'complete') {
                eventSource.close();
                setStats(data.stats);
                setUser(data.user);
                setTimeline(data.timeline);
                setScreen('story');
              }
            } catch (e) {
              console.error('Parse error:', e);
            }
          };

          eventSource.onerror = (err) => {
            eventSource.close();
            // Fallback to regular POST if SSE fails
            fallbackFetch(inputHandle);
          };

        } catch (err) {
          fallbackFetch(inputHandle);
        }
      };

      const fallbackFetch = async (inputHandle) => {
        try {
          setLoadingMessage('Fetching data...');
          const response = await fetch(`${API_URL}/api/wrapped`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ handle: inputHandle })
          });
          
          const data = await response.json();
          
          if (!response.ok) throw new Error(data.error || 'Failed to fetch');
          
          setStats(data.stats);
          setUser(data.user);
          setTimeline(data.timeline);
          setScreen('story');
        } catch (err) {
          setError(err.message);
          setScreen('error');
        }
      };

      const handleRestart = () => {
        setScreen('landing');
        setHandle('');
        setStats(null);
        setUser(null);
        setTimeline(null);
        setProgress(0);
      };

      return (
        <AnimatePresence mode="wait">
          {screen === 'landing' && <LandingPage key="landing" onSubmit={handleSubmit} />}
          {screen === 'loading' && <LoadingScreen key="loading" handle={handle} progress={progress} message={loadingMessage} tweetsFound={tweetsFound} />}
          {screen === 'story' && stats && <StoryView key="story" stats={stats} handle={handle} user={user} timeline={timeline} onRestart={handleRestart} />}
          {screen === 'error' && <ErrorScreen key="error" message={error} onRetry={handleRestart} />}
        </AnimatePresence>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
